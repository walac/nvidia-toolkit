# Rebuild the initramfs once akmods finishes building modules for a
# kernel, so newly installed kernels boot with NVIDIA drivers already
# present. This must not run synchronously from a kernel-install
# plugin: akmods installs its built kmod via a nested "dnf install",
# which deadlocks against the dnf transaction that triggered the
# kernel install in the first place. akmods@.service always runs
# detached from any such transaction, so hooking it here is safe.
[Service]
ExecStartPost=/usr/local/libexec/nvidia-akmods-dracut.sh %i

---
# tasks file for inference-stack

- name: Query latest Ollama release from GitHub
  uri:
    url: https://api.github.com/repos/ollama/ollama/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github+json
  register: ollama_latest_release

- name: Set latest Ollama version
  set_fact:
    ollama_version: "{{ ollama_latest_release.json.tag_name | regex_replace('^v', '') }}"

- name: Check installed Ollama version
  command: ollama --version
  register: ollama_installed_version
  changed_when: false
  failed_when: false

- name: Determine if Ollama install or upgrade is needed
  set_fact:
    ollama_needs_install: >-
      {{ ollama_installed_version.rc != 0 or
         ollama_version is version(
           ollama_installed_version.stdout | default('') | regex_search('[0-9]+\.[0-9]+\.[0-9]+') | default('0.0.0'),
           '>'
         ) }}

- name: Install or upgrade Ollama
  shell:
    cmd: curl -fsSL https://ollama.com/install.sh | sh
  when: ollama_needs_install
  register: ollama_install
  changed_when: ollama_install.rc == 0

